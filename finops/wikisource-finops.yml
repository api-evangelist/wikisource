specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/

provider: Wikisource
providerId: wikisource
created: '2026-06-13'
modified: '2026-06-13'
reconciled: true

tags:
  - FinOps
  - FOCUS
  - Open Knowledge
  - Public Domain
  - Free API

description: >-
  Wikisource APIs carry no direct monetary cost — all three API surfaces (MediaWiki Action API,
  MediaWiki Core REST API, Wikimedia REST API v1) are provided free by the Wikimedia Foundation
  under donor funding. There are no billing lines, subscription fees, or usage tiers. FinOps
  considerations are therefore internal: compute and bandwidth consumed by API integrations
  represent an indirect cost to the consuming organisation, and compliance with Wikimedia usage
  policies (User-Agent, serial requests, caching) is the primary lever for keeping that indirect
  cost low. Organisations with high-volume Wikisource text-extraction needs should prefer bulk
  XML dumps from dumps.wikimedia.org over repeated API calls.

sources:
  - https://foundation.wikimedia.org/wiki/Policy:Wikimedia_Foundation_API_Usage_Guidelines
  - https://www.mediawiki.org/wiki/API:Etiquette
  - https://dumps.wikimedia.org/
  - https://focus.finops.org/focus-specification/v1-3/

