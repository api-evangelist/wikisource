meters:
  - name: api_read_requests
    unit: request
    aggregation: sum
    dimensions:
      - api_surface
      - language_edition
      - endpoint_path
  - name: api_write_requests
    unit: request
    aggregation: sum
    dimensions:
      - api_surface
      - language_edition
      - action_type
  - name: bulk_dump_downloads
    unit: download
    aggregation: sum
    dimensions:
      - language_edition
      - dump_type
      - date
  - name: bandwidth_egress_gb
    unit: GB
    aggregation: sum
    dimensions:
      - api_surface
      - language_edition

principles:
  - name: Visibility
    description: >-
      Track internal API call volumes by language edition and endpoint path. Monitor for
      unexpectedly high read bursts (approaching the 200 RPS REST v1 ceiling) and log
      ratelimited / 429 responses to identify throttling incidents before they cause data gaps.
  - name: Allocation
    description: >-
      Tag API traffic by consuming team and use case (corpus research, legal document retrieval,
      proofread-status automation, etc.). Map language-edition usage to specific product lines
      where Wikisource content is embedded.
  - name: Optimization
    description: >-
      Prefer bulk XML dumps over repeated API calls for large one-off or periodic text extraction
      jobs. Cache REST API v1 responses locally and reuse within TTL. Batch Action API calls using
      pipe-separated titles to minimise round-trips. Reserve live API calls for real-time or
      incremental update scenarios only.
  - name: Accountability
    description: >-
      Designate an owner for each Wikisource integration. Ensure all clients set a compliant
      User-Agent to prevent IP blocks that would disrupt dependent services. Review usage patterns
      quarterly against Wikimedia's fair-use expectations and update to bulk dumps where API access
      is used inefficiently.
