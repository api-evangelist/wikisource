features:
  - name: 70+ Language Editions
    description: Wikisource operates in over 70 language editions; each subdomain ({lang}.wikisource.org) exposes the full MediaWiki API surface at the same paths.
  - name: Public-Domain Source Texts
    description: Hosts transcribed books, legal texts, constitutions, speeches, and historical documents no longer under copyright — all freely accessible via the API.
  - name: Proofread Page Extension
    description: Wikisource uses the ProofreadPage MediaWiki extension; its status levels (without text, not proofread, problematic, proofread, validated) are queryable via the Action API.
  - name: Wikitext-to-HTML Transforms
    description: Convert raw wikitext (including Wikisource templates and page-scan transclusions) to rendered HTML via /transform/wikitext/to/html/{title}.
  - name: Cached Anonymous Reads at 200 RPS
    description: The REST API v1 layer is Varnish-cached, supporting anonymous read bursts up to ~200 requests/s per client without authentication.
  - name: OAuth 2.0 Write Access
    description: Page edits and proofread-status updates authenticate via OAuth 2.0 tokens issued at meta.wikimedia.org — the same mechanism across all Wikimedia projects.
  - name: Bulk Text Dumps
    description: Full periodic XML dumps of every Wikisource language edition are available at dumps.wikimedia.org for offline corpus processing.

useCases:
  - name: Digitised Literature and Corpus Research
    description: Access transcribed works of literature, philosophy, and science for NLP corpus building, stylometric analysis, or training data curation.
  - name: Legal and Historical Document Retrieval
    description: Retrieve constitutions, treaties, legislation, and court opinions as structured wikitext or rendered HTML for legal research platforms.
  - name: AI Grounding with Primary Sources
    description: Ground LLM responses with primary-source citations rather than encyclopedic summaries — page summaries and full HTML available via the REST API.
  - name: Multilingual Text Collection
    description: Pull source texts across 70+ language editions for multilingual NLP models, translation studies, or cross-lingual information retrieval.
  - name: Proofread Status Monitoring
    description: Query and update ProofreadPage statuses to build community dashboards or automated quality-assurance workflows for text digitisation projects.
  - name: Offline Reading Applications
    description: Consume periodic bulk dumps to ship offline-readable collections of public-domain literature to schools and low-connectivity environments.

integrations:
  - name: Wikipedia
    description: Wikipedia articles often link to Wikisource for full-text versions of cited primary sources via interwiki links.
  - name: Wikidata
    description: Wikisource works are described as Wikidata items (edition type Q3331189); author pages link to Wikidata QIDs for authority control.
  - name: Wikimedia Commons
    description: Page-scan images underlying the ProofreadPage workflow are hosted on Commons and accessed via the Commons Action API.
  - name: Internet Archive
    description: Many Wikisource digitisation projects use scans sourced from the Internet Archive's Open Library collection.

solutions:
  - name: Free Public-Domain Text Library
    description: A non-profit, volunteer-curated repository of transcribed source texts funded by the Wikimedia Foundation — freely readable and downloadable with no API keys required.

