apis:
  - name: MediaWiki Action API
    description: >-
      The primary programmatic interface to Wikisource, exposed at /w/api.php on each language
      subdomain. Operations are dispatched via the action= parameter (query, parse, edit, upload,
      login, patrol, ...). Key for reading transcribed texts, searching categories, and editing or
      proofread-status updating. JSON is the recommended response format. Requests must carry a
      contactable User-Agent header.
    humanURL: https://www.mediawiki.org/wiki/API:Main_page
    baseURL: https://en.wikisource.org/w/api.php
    tags:
      - Action API
      - Read
      - Write
      - Edit
      - Search
      - Parse
    properties:
      - type: Documentation
        url: https://www.mediawiki.org/wiki/API:Main_page
      - type: Sandbox
        url: https://en.wikisource.org/wiki/Special:ApiSandbox
      - type: Tutorials
        url: https://www.mediawiki.org/wiki/API:Tutorial
      - type: Etiquette
        url: https://www.mediawiki.org/wiki/API:Etiquette

  - name: MediaWiki Core REST API
    description: >-
      Modern REST surface available on Wikisource at /w/rest.php/v1/. Provides page reads (source,
      HTML, bare metadata), full-text search, file metadata, page history, revision retrieval and
      comparison, and wikitext-to-HTML / HTML-to-wikitext transforms. Well-suited for integrations
      that need standard HTTP verbs rather than the action= dispatch style.
    humanURL: https://www.mediawiki.org/wiki/API:REST_API
    baseURL: https://en.wikisource.org/w/rest.php/v1
    tags:
      - REST API
      - Core
      - Pages
      - Search
      - History
      - Transforms
    properties:
      - type: Documentation
        url: https://www.mediawiki.org/wiki/API:REST_API/Reference
      - type: Sandbox
        url: https://en.wikisource.org/wiki/Special:RestSandbox
      - type: APIPortal
        url: https://api.wikimedia.org/wiki/Core_REST_API

  - name: Wikimedia REST API v1
    description: >-
      Caching-optimised read API available at /api/rest_v1/ on each Wikisource language subdomain.
      Provides page summaries, full HTML, media lists, and language links for Wikisource pages.
      Backed by Varnish CDN; anonymous read traffic is limited to approximately 200 requests per
      second per client. Provide a contactable User-Agent; GET is preferred for cacheability.
    humanURL: https://en.wikisource.org/api/rest_v1/
    baseURL: https://en.wikisource.org/api/rest_v1
    tags:
      - REST API
      - Cached
      - Summaries
      - HTML
      - Read
    properties:
      - type: Documentation
        url: https://en.wikisource.org/api/rest_v1/
      - type: Specification
        url: https://en.wikisource.org/api/rest_v1/?spec

