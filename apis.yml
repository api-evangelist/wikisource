aid: wikisource
name: Wikisource
description: >-
  Wikisource is the Wikimedia Foundation's free library of source texts — public-domain and
  freely-licensed books, historical documents, legal texts, constitutions, speeches, and other
  transcribed primary-source works in over 70 languages. The platform exposes its content through
  the same API surfaces as all MediaWiki installations: the MediaWiki Action API (action=query|parse|edit
  at /w/api.php), the MediaWiki Core REST API (/w/rest.php/v1/ for page CRUD, search, history, and
  transforms), and the legacy Wikimedia REST API v1 (/api/rest_v1/ for cached reads at up to 200 RPS).
  All APIs are free at point of use and governed by the Wikimedia API usage guidelines — a contactable
  User-Agent is mandatory and serial requests are preferred over parallel bursts.
